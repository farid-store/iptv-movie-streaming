<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>Aplikasi Web Pemutar IPTV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { 
            display: flex; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            height: 100vh; 
            background: #121212; 
            color: #ffffff; 
        }
        #sidebar { 
            width: 320px; 
            background: #1e1e1e; 
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.8);
            z-index: 10;
        }
        #sidebar-header {
            padding: 20px 15px 10px 15px;
            border-bottom: 1px solid #333;
        }
        #sidebar-header h2 { 
            font-size: 18px; 
            margin: 0 0 15px 0; 
            color: #f1f1f1;
        }
        #search-box {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            outline: none;
        }
        #search-box:focus {
            border-color: #007bff;
        }
        #playlist { 
            flex-grow: 1;
            overflow-y: auto; 
            padding: 15px; 
        }
        #player-container { 
            flex-grow: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            flex-direction: column; 
            background: #0a0a0a; 
            padding: 20px;
        }
        video { 
            width: 100%; 
            max-width: 1000px; 
            aspect-ratio: 16/9; 
            background: #000; 
            border: 1px solid #333; 
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .channel-btn { 
            display: block; 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 8px; 
            background: #2a2a2a; 
            color: #e0e0e0; 
            border: 1px solid transparent; 
            border-radius: 6px;
            cursor: pointer; 
            text-align: left; 
            transition: all 0.2s ease;
            font-size: 14px;
        }
        .channel-btn:hover { 
            background: #3a3a3a; 
            border-color: #555;
        }
        .active { 
            background: #0056b3; 
            color: #ffffff;
            font-weight: bold; 
            border-color: #007bff;
        }
        #channel-title { 
            color: #cccccc; 
            margin-bottom: 10px;
            font-weight: normal;
        }
        #player-status {
            color: #ffcc00;
            font-size: 14px;
            margin-top: 15px;
            text-align: center;
            min-height: 20px;
        }
        .status-text {
            color: #888;
            font-size: 14px;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="sidebar-header">
            <h2>Daftar Saluran Televisi</h2>
            <input type="text" id="search-box" placeholder="Cari nama saluran televisi..." onkeyup="filterChannels()">
        </div>
        <div id="playlist">
            <div class="status-text">Memuat data saluran televisi...</div>
        </div>
    </div>

    <div id="player-container">
        <h2 id="channel-title">Silakan pilih saluran televisi dari daftar di sebelah kiri</h2>
        <video id="video" controls autoplay></video>
        <div id="player-status"></div>
    </div>

    <script>
        const playlistUrls = [
            'https://mgi24.github.io/tvdigital/idwork.m3u',
            'https://iptv-org.github.io/iptv/index.m3u'
        ];
        
        const video = document.getElementById('video');
        const statusElement = document.getElementById('player-status');
        let hlsPlayer;
        let allChannels = [];

        async function loadPlaylists() {
            for (const url of playlistUrls) {
                try {
                    const response = await fetch(url);
                    const data = await response.text();
                    parseM3U(data);
                } catch (error) {
                    console.error('Terjadi kesalahan saat mengambil data dari tautan:', url, error);
                }
            }
            renderPlaylist(allChannels.slice(0, 100));
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            let currentName = '';

            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    const parts = line.split(',');
                    currentName = parts[parts.length - 1].trim();
                } else if (line && !line.startsWith('#')) {
                    if (currentName) {
                        allChannels.push({ name: currentName, url: line });
                        currentName = '';
                    }
                }
            });
        }

        function renderPlaylist(channels) {
            const playlistDiv = document.getElementById('playlist');
            playlistDiv.innerHTML = ''; 

            if (channels.length === 0) {
                playlistDiv.innerHTML = '<div class="status-text">Saluran televisi tidak ditemukan.</div>';
                return;
            }

            channels.forEach(channel => {
                const btn = document.createElement('button');
                btn.className = 'channel-btn';
                btn.innerText = channel.name;
                btn.onclick = () => playStream(channel.url, channel.name, btn);
                playlistDiv.appendChild(btn);
            });
        }

        function filterChannels() {
            const query = document.getElementById('search-box').value.toLowerCase();
            
            if (!query) {
                renderPlaylist(allChannels.slice(0, 100));
                return;
            }

            const filtered = allChannels.filter(channel => 
                channel.name.toLowerCase().includes(query)
            );
            
            renderPlaylist(filtered.slice(0, 100));
        }

        function playStream(url, name, btn) {
            document.getElementById('channel-title').innerText = 'Menghubungkan ke: ' + name;
            statusElement.innerText = 'Sedang memuat saluran televisi...';
            statusElement.style.color = '#ffcc00';

            document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');

            if (Hls.isSupported()) {
                if (hlsPlayer) {
                    hlsPlayer.destroy(); 
                }
                
                hlsPlayer = new Hls({
                    debug: false,
                    enableWorker: true
                });
                
                hlsPlayer.loadSource(url);
                hlsPlayer.attachMedia(video);
                
                // Menangani saat video berhasil diproses
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function() {
                    statusElement.innerText = 'Pemutaran berhasil dimulai.';
                    statusElement.style.color = '#00ff00';
                    video.play().catch(function(error) {
                        statusElement.innerText = 'Silakan klik tombol putar pada pemutar video.';
                    });
                });

                // Menangani kesalahan pemutaran
                hlsPlayer.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                statusElement.innerText = 'Kesalahan Jaringan atau CORS: Saluran ini tidak mengizinkan pemutaran dari situs web ini atau peladen sedang mati.';
                                statusElement.style.color = '#ff3333';
                                hlsPlayer.destroy();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                statusElement.innerText = 'Kesalahan Media: Sedang mencoba memulihkan pemutaran...';
                                hlsPlayer.recoverMediaError();
                                break;
                            default:
                                statusElement.innerText = 'Terjadi kesalahan fatal yang tidak diketahui pada siaran ini.';
                                statusElement.style.color = '#ff3333';
                                hlsPlayer.destroy();
                                break;
                        }
                    }
                });

            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    statusElement.innerText = 'Pemutaran berhasil dimulai.';
                    statusElement.style.color = '#00ff00';
                    video.play();
                });
                video.addEventListener('error', function() {
                    statusElement.innerText = 'Terjadi kesalahan. Saluran televisi tidak dapat diputar pada peramban ini.';
                    statusElement.style.color = '#ff3333';
                });
            }
        }

        loadPlaylists();
    </script>
</body>
</html>
