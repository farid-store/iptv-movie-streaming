<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Web Pemutar IPTV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { 
            display: flex; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            height: 100vh; 
            background: #121212; 
            color: #ffffff; 
        }
        #sidebar { 
            width: 320px; 
            background: #1e1e1e; 
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.8);
            z-index: 10;
        }
        #sidebar-header {
            padding: 20px 15px 10px 15px;
            border-bottom: 1px solid #333;
        }
        #sidebar-header h2 { 
            font-size: 18px; 
            margin: 0 0 15px 0; 
            color: #f1f1f1;
        }
        #search-box {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            outline: none;
        }
        #search-box:focus {
            border-color: #007bff;
        }
        #playlist { 
            flex-grow: 1;
            overflow-y: auto; 
            padding: 15px; 
        }
        #player-container { 
            flex-grow: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            flex-direction: column; 
            background: #0a0a0a; 
            padding: 20px;
        }
        video { 
            width: 100%; 
            max-width: 1000px; 
            aspect-ratio: 16/9; 
            background: #000; 
            border: 1px solid #333; 
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .channel-btn { 
            display: block; 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 8px; 
            background: #2a2a2a; 
            color: #e0e0e0; 
            border: 1px solid transparent; 
            border-radius: 6px;
            cursor: pointer; 
            text-align: left; 
            transition: all 0.2s ease;
            font-size: 14px;
        }
        .channel-btn:hover { 
            background: #3a3a3a; 
            border-color: #555;
        }
        .active { 
            background: #0056b3; 
            color: #ffffff;
            font-weight: bold; 
            border-color: #007bff;
        }
        #channel-title { 
            color: #cccccc; 
            margin-bottom: 20px;
            font-weight: normal;
        }
        .status-text {
            color: #888;
            font-size: 14px;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="sidebar-header">
            <h2>Daftar Saluran Televisi</h2>
            <input type="text" id="search-box" placeholder="Cari nama saluran televisi..." onkeyup="filterChannels()">
        </div>
        <div id="playlist">
            <div class="status-text">Memuat data saluran televisi...</div>
        </div>
    </div>

    <div id="player-container">
        <h2 id="channel-title">Silakan pilih saluran televisi dari daftar di sebelah kiri</h2>
        <video id="video" controls autoplay></video>
    </div>

    <script>
        // Daftar tautan M3U
        const playlistUrls = [
            'https://mgi24.github.io/tvdigital/idwork.m3u',
            'https://iptv-org.github.io/iptv/index.m3u'
        ];
        
        const video = document.getElementById('video');
        let hlsPlayer;
        let allChannels = [];

        // Fungsi untuk mengambil dan menggabungkan semua daftar putar
        async function loadPlaylists() {
            for (const url of playlistUrls) {
                try {
                    const response = await fetch(url);
                    const data = await response.text();
                    parseM3U(data);
                } catch (error) {
                    console.error('Terjadi kesalahan saat mengambil data dari tautan:', url, error);
                }
            }
            
            // Hapus duplikat saluran jika ada, dan tampilkan 100 saluran pertama
            renderPlaylist(allChannels.slice(0, 100));
        }

        // Fungsi untuk membaca format fail M3U
        function parseM3U(data) {
            const lines = data.split('\n');
            let currentName = '';

            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    const parts = line.split(',');
                    currentName = parts[parts.length - 1].trim();
                } else if (line && !line.startsWith('#')) {
                    if (currentName) {
                        allChannels.push({ name: currentName, url: line });
                        currentName = '';
                    }
                }
            });
        }

        // Fungsi untuk menampilkan tombol saluran pada antarmuka
        function renderPlaylist(channels) {
            const playlistDiv = document.getElementById('playlist');
            playlistDiv.innerHTML = ''; 

            if (channels.length === 0) {
                playlistDiv.innerHTML = '<div class="status-text">Saluran televisi tidak ditemukan.</div>';
                return;
            }

            channels.forEach(channel => {
                const btn = document.createElement('button');
                btn.className = 'channel-btn';
                btn.innerText = channel.name;
                btn.onclick = () => playStream(channel.url, channel.name, btn);
                playlistDiv.appendChild(btn);
            });
        }

        // Fungsi untuk menyaring saluran berdasarkan masukan pencarian
        function filterChannels() {
            const query = document.getElementById('search-box').value.toLowerCase();
            
            if (!query) {
                // Jika kotak pencarian kosong, kembalikan ke 100 saluran pertama
                renderPlaylist(allChannels.slice(0, 100));
                return;
            }

            // Menyaring saluran yang namanya mengandung kata kunci pencarian
            const filtered = allChannels.filter(channel => 
                channel.name.toLowerCase().includes(query)
            );
            
            // Membatasi hasil pencarian hingga 100 agar peramban tetap ringan
            renderPlaylist(filtered.slice(0, 100));
        }

        // Fungsi utama untuk memutar video (streaming)
        function playStream(url, name, btn) {
            document.getElementById('channel-title').innerText = 'Sedang Memutar: ' + name;

            // Memperbarui indikator visual pada tombol saluran yang aktif
            document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');

            // Logika pemutar video menggunakan HLS.js
            if (Hls.isSupported()) {
                if (hlsPlayer) {
                    hlsPlayer.destroy(); 
                }
                hlsPlayer = new Hls();
                hlsPlayer.loadSource(url);
                hlsPlayer.attachMedia(video);
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } 
            // Alternatif untuk peramban Safari yang mendukung HLS secara bawaan
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        }

        // Memulai proses pengambilan data ketika halaman dimuat
        loadPlaylists();
    </script>
</body>
</html>
