<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web IPTV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { 
            display: flex; 
            font-family: Arial, sans-serif; 
            margin: 0; 
            height: 100vh; 
            background: #121212; 
            color: #ffffff; 
        }
        #sidebar { 
            width: 300px; 
            background: #1e1e1e; 
            overflow-y: auto; 
            padding: 15px; 
            box-shadow: 2px 0 5px rgba(0,0,0,0.5);
        }
        #player-container { 
            flex-grow: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            flex-direction: column; 
            background: #000000; 
        }
        video { 
            width: 90%; 
            max-width: 900px; 
            aspect-ratio: 16/9; 
            background: #000; 
            border: 2px solid #333; 
            border-radius: 8px;
        }
        .channel-btn { 
            display: block; 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 8px; 
            background: #2a2a2a; 
            color: #ffffff; 
            border: none; 
            border-radius: 4px;
            cursor: pointer; 
            text-align: left; 
            transition: background 0.2s;
        }
        .channel-btn:hover { background: #444; }
        .active { background: #007bff; font-weight: bold; }
        h2 { font-size: 18px; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px;}
        #channel-title { color: #aaa; margin-bottom: 15px;}
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Daftar Channel TV</h2>
        <div id="playlist">Memuat playlist...</div>
    </div>

    <div id="player-container">
        <h2 id="channel-title">Pilih channel dari daftar di samping</h2>
        <video id="video" controls autoplay></video>
    </div>

    <script>
        // Link M3U dari kamu
        const playlistUrl = 'https://mgi24.github.io/tvdigital/idwork.m3u';
        const video = document.getElementById('video');
        let hls;

        // Mengambil dan membaca file M3U
        fetch(playlistUrl)
            .then(response => response.text())
            .then(data => {
                const lines = data.split('\n');
                const channels = [];
                let currentName = '';

                // Parsing baris per baris
                lines.forEach(line => {
                    line = line.trim();
                    if (line.startsWith('#EXTINF:')) {
                        // Mengambil nama channel (biasanya setelah tanda koma terakhir)
                        const parts = line.split(',');
                        currentName = parts[parts.length - 1];
                    } else if (line && !line.startsWith('#')) {
                        // Ini adalah link streaming m3u8
                        if (currentName) {
                            channels.push({ name: currentName, url: line });
                            currentName = '';
                        }
                    }
                });

                renderPlaylist(channels);
            })
            .catch(err => {
                document.getElementById('playlist').innerText = 'Gagal memuat playlist. Coba periksa koneksi atau masalah CORS.';
                console.error('Error fetching playlist:', err);
            });

        // Menampilkan tombol channel
        function renderPlaylist(channels) {
            const playlistDiv = document.getElementById('playlist');
            playlistDiv.innerHTML = ''; // Hapus teks loading

            channels.forEach(channel => {
                const btn = document.createElement('button');
                btn.className = 'channel-btn';
                btn.innerText = channel.name;
                btn.onclick = () => playStream(channel.url, channel.name, btn);
                playlistDiv.appendChild(btn);
            });
        }

        // Fungsi memutar video
        function playStream(url, name, btn) {
            document.getElementById('channel-title').innerText = 'Memutar: ' + name;

            // Efek warna pada tombol yang sedang aktif
            document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');

            // Logika pemutar video dengan HLS.js
            if (Hls.isSupported()) {
                if (hls) hls.destroy(); // Bersihkan stream sebelumnya
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } 
            // Fallback untuk browser Safari (mendukung HLS secara bawaan)
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        }
    </script>
</body>
</html>
