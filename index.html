<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farid Store TV - Premium IPTV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* Custom Scrollbar yang elegan */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #4f46e5; }
        
        .channel-active {
            background-color: #4f46e5 !important;
            border-left: 4px solid #818cf8 !important;
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-200 h-screen flex flex-col md:flex-row font-sans overflow-hidden">

    <aside class="w-full md:w-80 bg-gray-900 border-r border-gray-800 flex flex-col h-2/5 md:h-full z-20 shadow-2xl shrink-0">
        <div class="p-5 border-b border-gray-800 bg-gray-900/95 backdrop-blur z-10 sticky top-0">
            <div class="flex items-center gap-3 mb-4">
                <i class="ph-fill ph-television-simple text-3xl text-indigo-500"></i>
                <div>
                    <h1 class="text-xl font-bold text-white tracking-wide">Live<span class="text-indigo-500">TV</span></h1>
                    <p class="text-xs text-gray-400">Farid Store Streaming</p>
                </div>
            </div>
            
            <div class="relative">
                <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                <input type="text" id="search-box" placeholder="Cari channel..." 
                    class="w-full bg-gray-800 text-sm text-white rounded-lg pl-10 pr-4 py-2.5 outline-none border border-gray-700 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all placeholder-gray-500"
                    onkeyup="filterChannels()">
            </div>
            <div id="channel-stats" class="text-xs text-gray-500 mt-3 flex justify-between">
                <span>Memuat data...</span>
            </div>
        </div>

        <div id="playlist" class="flex-1 overflow-y-auto p-3 space-y-1.5 scroll-smooth">
            <div class="flex flex-col items-center justify-center h-full text-gray-500 space-y-2">
                <i class="ph ph-spinner-gap animate-spin text-3xl text-indigo-500"></i>
                <p class="text-sm">Mengambil playlist...</p>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-3/5 md:h-full bg-black relative">
        
        <header class="absolute top-0 left-0 w-full p-6 bg-gradient-to-b from-black/90 to-transparent z-10 flex justify-between items-start pointer-events-none">
            <div>
                <h2 id="channel-title" class="text-2xl font-bold text-white drop-shadow-md">Belum ada channel dipilih</h2>
                <div id="player-status" class="flex items-center gap-2 mt-2 text-sm text-gray-300 bg-black/40 w-max px-3 py-1 rounded-full backdrop-blur">
                    <span class="w-2 h-2 rounded-full bg-gray-500" id="status-dot"></span>
                    <span id="status-text">Pilih channel di sidebar</span>
                </div>
            </div>
        </header>

        <div class="flex-1 flex items-center justify-center relative w-full h-full">
            <video id="video" class="w-full h-full object-contain bg-black" controls autoplay playsinline></video>
            
            <div id="video-loading" class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center hidden z-20">
                <i class="ph ph-circle-notch animate-spin text-5xl text-indigo-500 mb-4"></i>
                <p class="text-indigo-400 font-medium animate-pulse">Menghubungkan ke server...</p>
            </div>
        </div>
    </main>

    <script>
        const playlistUrls = [
            'https://mgi24.github.io/tvdigital/idwork.m3u',
            'https://iptv-org.github.io/iptv/index.m3u'
        ];
        
        const video = document.getElementById('video');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const loadingOverlay = document.getElementById('video-loading');
        const playlistDiv = document.getElementById('playlist');
        const channelStats = document.getElementById('channel-stats');
        
        let hlsPlayer = null;
        let allChannels = [];
        const RENDER_LIMIT = 150; // Render maksimal 150 agar browser tidak lag

        // Update UI Status
        function updateStatus(message, state) {
            statusText.innerText = message;
            statusDot.className = 'w-2 h-2 rounded-full';
            if(state === 'success') statusDot.classList.add('bg-green-500', 'animate-pulse');
            else if(state === 'error') statusDot.classList.add('bg-red-500');
            else if(state === 'loading') statusDot.classList.add('bg-yellow-500');
            else statusDot.classList.add('bg-gray-500');
        }

        async function loadPlaylists() {
            for (const url of playlistUrls) {
                try {
                    const response = await fetch(url);
                    const data = await response.text();
                    parseM3U(data);
                } catch (error) {
                    console.error('Gagal mengambil data dari:', url, error);
                }
            }
            channelStats.innerHTML = `<span>Total: <b>${allChannels.length}</b> channel</span><span>Menampilkan ${Math.min(RENDER_LIMIT, allChannels.length)}</span>`;
            renderPlaylist(allChannels.slice(0, RENDER_LIMIT));
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            let currentName = '';

            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    const parts = line.split(',');
                    // Membersihkan nama dari karakter aneh
                    currentName = parts.length > 1 ? parts[parts.length - 1].trim() : 'Unknown Channel';
                } else if (line && !line.startsWith('#')) {
                    if (currentName) {
                        allChannels.push({ name: currentName, url: line });
                        currentName = '';
                    }
                }
            });
        }

        function renderPlaylist(channels) {
            playlistDiv.innerHTML = ''; 

            if (channels.length === 0) {
                playlistDiv.innerHTML = `
                    <div class="text-center p-6 text-gray-500">
                        <i class="ph ph-mask-sad text-4xl mb-2"></i>
                        <p>Channel tidak ditemukan.</p>
                    </div>`;
                return;
            }

            channels.forEach((channel, index) => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left px-4 py-3 bg-gray-800/50 hover:bg-gray-800 border-l-4 border-transparent rounded-r-lg mb-1.5 transition-all duration-200 flex items-center justify-between group';
                btn.innerHTML = `
                    <span class="text-sm font-medium text-gray-300 group-hover:text-white truncate pr-2">${channel.name}</span>
                    <i class="ph-fill ph-play-circle text-indigo-500 opacity-0 group-hover:opacity-100 transition-opacity"></i>
                `;
                btn.onclick = () => playStream(channel.url, channel.name, btn);
                playlistDiv.appendChild(btn);
            });
        }

        function filterChannels() {
            const query = document.getElementById('search-box').value.toLowerCase();
            if (!query) {
                renderPlaylist(allChannels.slice(0, RENDER_LIMIT));
                return;
            }
            // Filter semua channel, lalu batasi render agar tidak lag
            const filtered = allChannels.filter(channel => channel.name.toLowerCase().includes(query));
            renderPlaylist(filtered.slice(0, RENDER_LIMIT));
        }

        function playStream(url, name, btn) {
            document.getElementById('channel-title').innerText = name;
            updateStatus('Menghubungkan...', 'loading');
            loadingOverlay.classList.remove('hidden');

            // Reset tombol aktif
            document.querySelectorAll('#playlist button').forEach(b => b.classList.remove('channel-active', 'bg-indigo-600'));
            if (btn) btn.classList.add('channel-active');

            if (Hls.isSupported()) {
                if (hlsPlayer) {
                    hlsPlayer.destroy(); 
                }
                
                hlsPlayer = new Hls({
                    maxBufferLength: 30,
                    maxMaxBufferLength: 600,
                });
                
                hlsPlayer.loadSource(url);
                hlsPlayer.attachMedia(video);
                
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function() {
                    loadingOverlay.classList.add('hidden');
                    updateStatus('Memutar', 'success');
                    video.play().catch(e => {
                        updateStatus('Klik play untuk memulai', 'loading');
                        console.log("Autoplay dicegah browser", e);
                    });
                });

                hlsPlayer.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        loadingOverlay.classList.add('hidden');
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                updateStatus('Gagal: Diblokir CORS atau Server Mati', 'error');
                                hlsPlayer.destroy();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                updateStatus('Memulihkan error media...', 'loading');
                                hlsPlayer.recoverMediaError();
                                break;
                            default:
                                updateStatus('Error fatal tidak diketahui', 'error');
                                hlsPlayer.destroy();
                                break;
                        }
                    }
                });

            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Untuk pengguna Safari/iOS
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    loadingOverlay.classList.add('hidden');
                    updateStatus('Memutar', 'success');
                    video.play();
                });
                video.addEventListener('error', function() {
                    loadingOverlay.classList.add('hidden');
                    updateStatus('Format tidak didukung', 'error');
                });
            }
        }

        // Jalankan saat web dimuat
        loadPlaylists();
    </script>
</body>
</html>
